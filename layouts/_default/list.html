{{ define "main" }}
<h1 style="font-family: var(--font-display); font-size: 1.75rem; color: var(--accent); margin-bottom: 2rem; text-wrap: balance;">{{ .Title }}</h1>

<ul class="post-list">
  {{ range .Pages }}
  <li class="post-item">
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    {{ with .Summary }}<p class="post-summary">{{ . }}</p>{{ end }}
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}<a class="tag" href="/tags/{{ . | urlize }}">{{ . }}</a>{{ end }}
    </div>
    {{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
